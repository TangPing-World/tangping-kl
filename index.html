<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>躺平 今晚点歌</title>
<style>
:root {
  --primary: #E8621A;
  --primary-dim: rgba(232,98,26,0.12);
  --bg: #0C0C0C;
  --card: #181818;
  --border: #2A2A2A;
  --text: #F0F0F0;
  --muted: #888;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }

.header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(12,12,12,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.logo { font-size: 15px; font-weight: 800; color: var(--primary); }
.sub-info { font-size: 12px; color: var(--muted); margin-top: 2px; }
.pill {
  background: #222; color: var(--muted);
  font-size: 13px; font-weight: 700;
  padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
  white-space: nowrap;
}
.pill.has-sel { background: var(--primary); color: white; }
.pill.full { background: #22C55E; color: white; }

.banner {
  background: #130800; border-bottom: 1px solid #2D1500;
  padding: 12px 18px; font-size: 13px; color: #CCA880;
  line-height: 1.5; text-align: center;
}
.banner strong { color: var(--primary); }



.songs-wrap { padding: 0 14px 100px; }
.sec-label {
  font-size: 11px; font-weight: 700; color: var(--muted);
  letter-spacing: 1px; text-transform: uppercase;
  padding: 14px 4px 8px;
}
.songs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.song-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 13px 12px 11px;
  cursor: pointer; transition: all 0.15s; position: relative; user-select: none;
}
.song-card:active { transform: scale(0.96); }
.song-card.selected { background: var(--primary-dim); border-color: var(--primary); }
.song-card.dimmed { opacity: 0.35; pointer-events: none; }

.chk {
  position: absolute; top: 8px; right: 8px;
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--border); background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent; transition: all 0.15s; flex-shrink:0;
}
.song-card.selected .chk { background: var(--primary); border-color: var(--primary); color: white; }
.s-tag { font-size: 10px; font-weight: 600; color: var(--primary); opacity: 0.8; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.s-title { font-size: 13px; font-weight: 700; line-height: 1.35; color: var(--text); padding-right: 20px; }
.song-card.selected .s-title { color: #FFD4A8; }

.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(12,12,12,0.97); border-top: 1px solid var(--border);
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
}
.sub-btn {
  width: 100%; padding: 15px; background: var(--primary); color: white;
  border: none; border-radius: var(--radius);
  font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s;
}
.sub-btn:disabled { background: #2A2A2A; color: #555; cursor: not-allowed; }
.sub-btn.loading { opacity: 0.7; }

/* Thanks */
#thanks {
  display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 40px 24px;
}
.ty-icon { font-size: 72px; margin-bottom: 24px; animation: pop 0.4s ease; }
.ty-title { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
.ty-sub { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 28px; }
.ty-picks { width: 100%; max-width: 320px; margin-bottom: 28px; }
.ty-pick { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; font-size: 14px; font-weight: 600; color: #FFD4A8;
  text-align: left; margin-bottom: 6px; }
.ty-timer { font-size: 13px; color: #444; }

/* No schedule */
.no-show { display:flex; flex-direction:column; align-items:center; justify-content:center;
  height: 70vh; text-align:center; padding: 24px; }
.no-show .icon { font-size: 48px; margin-bottom: 16px; }
.no-show .msg { font-size: 15px; color: var(--muted); line-height: 1.7; }

/* Spinner */
.spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pop { 0%{transform:scale(0.5);opacity:0} 80%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
</style>
</head>

<div class="footer" id="footer">

function zhTitle(t) {
  return TITLE_ZH[t] || t;
}

// ─── State ───
let selected = [];
let todayStr = '';
let todayData = null;

// ─── Init ───
(function init() {
  const d = DATE_OVERRIDE || new Date().toISOString().slice(0,10);
  todayStr = d;
  const parts = d.split('-');
  const dateObj = new Date(+parts[0], +parts[1]-1, +parts[2]);
  document.getElementById('hdr-date').textContent =
    dateObj.toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

  const info = TP_DATA.schedule[d];
  if (!info || !info.singers.length) {
    document.getElementById('songs-wrap').innerHTML =
      '<div class="no-show"><div class="icon">🎵</div><div class="msg">今天暂无演出安排<br>如有疑问请联系场务</div></div>';
    document.getElementById('footer').style.display = 'none';
    return;
  }
  todayData = info;

  // Deduplicate songs (same title from multiple singers)
  const seen = new Set();
  const uniqueSongs = [];
  info.songs.forEach(song => {
    if (!seen.has(song.t)) {
      seen.add(song.t);
      uniqueSongs.push(song);
    }
  });

  // Render flat song grid (no singer grouping)
  document.getElementById('songs-wrap').innerHTML =
    '<div class="songs-grid">' +
    uniqueSongs.map(song => {
      const id = 'c_' + song.t.replace(/[^a-zA-Z0-9]/g,'_');
      const display = zhTitle(song.t);
      return `<div class="song-card" id="${id}" data-t="${h(song.t)}" data-s="${h(song.s.join(','))}" onclick="toggle(this)">
        <div class="chk">✓</div>
        <div class="s-title">${h(display)}</div>
      </div>`;
    }).join('') +
    '</div>';
})();

// ─── Toggle song ───
function toggle(el) {
  const key = el.dataset.t + '|||' + el.dataset.s;
  const idx = selected.findIndex(s => s.key === key);
  if (idx >= 0) {
    selected.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    if (selected.length >= 5) {
      el.animate([{borderColor:'#E8621A'},{borderColor:''}], {duration:400});
      return;
    }
    selected.push({ key, title: el.dataset.t, singer: el.dataset.s });
    el.classList.add('selected');
  }
  const full = selected.length >= 5;
  document.querySelectorAll('.song-card:not(.selected)').forEach(c => c.classList.toggle('dimmed', full));
  updateUI();
}

function updateUI() {
  const n = selected.length;
  const pill = document.getElementById('pill');
  pill.textContent = n + ' / 5';
  pill.className = 'pill' + (n >= 5 ? ' full' : n > 0 ? ' has-sel' : '');
  const btn = document.getElementById('sub-btn');
  btn.disabled = n === 0;
  btn.textContent = n === 0 ? '请先选择歌曲' : `提交我的选择（${n}/5）→`;
}

// ─── Submit ───
async function submitVote() {
  if (!selected.length) return;
  const btn = document.getElementById('sub-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 提交中...';

  const payload = {
    date: todayStr,
    votes: selected.map(s => ({ title: s.title, singer: s.singer })),
    ts: Date.now()
  };

  // Try sending to Apps Script endpoint
  const sent = await trySend(payload);

  // Also always save locally as fallback
  const lsKey = 'tangping_votes_' + todayStr;
  let local = {};
  try { local = JSON.parse(localStorage.getItem(lsKey) || '{}'); } catch(e) {}
  selected.forEach(s => { local[s.key] = (local[s.key] || 0) + 1; });
  localStorage.setItem(lsKey, JSON.stringify(local));

  showThanks();
}

async function trySend(payload) {
  if (!VOTE_ENDPOINT || VOTE_ENDPOINT === 'YOUR_APPS_SCRIPT_URL_HERE') return false;
  try {
    await fetch(VOTE_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return true;
  } catch(e) { return false; }
}

// ─── Thanks screen ───
function showThanks() {
  document.getElementById('ty-picks').innerHTML =
    selected.map(s => `<div class="ty-pick">🎵 ${h(zhTitle(s.title))}</div>`).join('');
  document.getElementById('main').style.display = 'none';
  document.getElementById('footer').style.display = 'none';
  document.getElementById('thanks').style.display = 'flex';

  let secs = 8;
  const timer = document.getElementById('ty-timer');
  const iv = setInterval(() => {
    secs--;
    timer.textContent = secs + ' 秒后重置给下一位';
    if (secs <= 0) { clearInterval(iv); reset(); }
  }, 1000);
}

function reset() {
  selected = [];
  document.querySelectorAll('.song-card').forEach(c => c.classList.remove('selected','dimmed'));
  updateUI();
  document.getElementById('main').style.display = '';
  document.getElementById('footer').style.display = '';
  document.getElementById('thanks').style.display = 'none';
}

function h(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
